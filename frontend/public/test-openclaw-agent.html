<!DOCTYPE html>
<html>
<head>
  <title>OpenClaw Agent Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #0f0;
      padding: 20px;
      margin: 0;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #0f0; }
    .status {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-weight: bold;
    }
    .status.connected { background: #003300; color: #66ff66; }
    .status.disconnected { background: #330000; color: #ff6666; }

    .controls {
      margin-bottom: 20px;
      padding: 10px;
      border: 1px solid #0f0;
      border-radius: 4px;
    }

    button {
      padding: 10px 15px;
      margin-right: 10px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: monospace;
    }
    button:hover { background: #00ff00; }
    button:disabled { background: #666; cursor: not-allowed; }

    input {
      padding: 8px;
      background: #1a1f3a;
      color: #0f0;
      border: 1px solid #0f0;
      border-radius: 4px;
      font-family: monospace;
      width: 300px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .panel {
      border: 1px solid #0f0;
      border-radius: 4px;
      padding: 15px;
      background: #0a0e27;
    }

    .panel h3 {
      margin-top: 0;
      color: #0f0;
      border-bottom: 1px solid #0f0;
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .copy-btn {
      padding: 4px 8px;
      font-size: 12px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: bold;
    }
    .copy-btn:hover { background: #00ff00; }

    #log, #raw {
      height: 400px;
      overflow-y: auto;
      background: #000;
      padding: 10px;
      border: 1px solid #0f0;
      border-radius: 4px;
      margin-top: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 12px;
      line-height: 1.4;
    }

    .event { color: #66ff66; }
    .response { color: #66ccff; }
    .error { color: #ff6666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 OpenClaw Agent Method Test</h1>

    <div id="status" class="status disconnected">🔴 Disconnected</div>

    <div class="controls">
      <button id="connectBtn" onclick="connect()">Connect</button>
      <button id="sendBtn" onclick="sendAgent()" disabled>Send Agent</button>
      <button id="sendSessionBtn" onclick="sendSession()" disabled>Send Session</button>
      <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
      <input type="text" id="input" placeholder="Message..." value="What is your name?">
      <button onclick="clearLogs()">Clear</button>
    </div>

    <div class="panels">
      <div class="panel">
        <h3>
          📊 Log
          <button class="copy-btn" onclick="copyLog()">Copy</button>
        </h3>
        <div id="log"></div>
      </div>
      <div class="panel">
        <h3>
          📨 Raw
          <button class="copy-btn" onclick="copyRaw()">Copy</button>
        </h3>
        <div id="raw"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "ws://127.0.0.1:18789";
    const TOKEN = "test-token-123456";
    let ws = null;
    let msgId = 0;
    let connected = false;

    function nextMsgId() {
      return `msg-${++msgId}`;
    }

    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'event' ? 'event' : type === 'response' ? 'response' : 'info';
      logDiv.innerHTML += `<div class="${className}"><span style="color:#666">[${timestamp}]</span> ${msg}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function logRaw(data) {
      const rawDiv = document.getElementById('raw');
      rawDiv.innerHTML += `<div>${JSON.stringify(data, null, 2)}</div><hr>`;
      rawDiv.scrollTop = rawDiv.scrollHeight;
    }

    function updateStatus(isConnected) {
      connected = isConnected;
      const statusDiv = document.getElementById('status');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const sendBtn = document.getElementById('sendBtn');
      const sendSessionBtn = document.getElementById('sendSessionBtn');

      if (isConnected) {
        statusDiv.className = 'status connected';
        statusDiv.textContent = '🟢 Connected (Ready)';
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        sendBtn.disabled = false;
        sendSessionBtn.disabled = false;
      } else {
        statusDiv.className = 'status disconnected';
        statusDiv.textContent = '🔴 Disconnected';
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        sendBtn.disabled = true;
        sendSessionBtn.disabled = true;
      }
    }

    function connect() {
      log(`Connecting to ${BASE_URL}...`);
      updateStatus(false);

      try {
        ws = new WebSocket(BASE_URL);

        ws.onopen = () => {
          log('✅ WebSocket connected', 'event');
        };

        ws.onmessage = (event) => {
          try {
            const frame = JSON.parse(event.data);
            logRaw(frame);

            if (frame.type === 'event') {
              log(`📨 EVENT: ${frame.event}`, 'event');
              if (frame.event === 'connect.challenge') {
                handleChallenge(frame.payload);
              }
            } else if (frame.type === 'res') {
              log(`📋 RESPONSE: id=${frame.id}, ok=${frame.ok}`, 'response');

              if (frame.payload?.type === 'hello-ok') {
                log('✅ Connected!', 'event');
                updateStatus(true);
              }

              if (!frame.ok) {
                log(`❌ ${frame.error?.message}`, 'error');
              } else if (frame.payload) {
                const preview = JSON.stringify(frame.payload).substring(0, 80);
                log(`✓ Payload: ${preview}...`, 'response');
              }
            }
          } catch (e) {
            log(`Parse error: ${e.message}`, 'error');
          }
        };

        ws.onerror = (err) => {
          log(`Error: ${err}`, 'error');
        };

        ws.onclose = () => {
          log('Closed', 'error');
          updateStatus(false);
        };
      } catch (e) {
        log(`Failed: ${e.message}`, 'error');
      }
    }

    function disconnect() {
      if (ws) ws.close();
      log('Disconnecting...');
    }

    function handleChallenge(challenge) {
      log(`✓ Challenge received`, 'event');

      const req = {
        type: "req",
        id: nextMsgId(),
        method: "connect",
        params: {
          minProtocol: 3,
          maxProtocol: 3,
          client: { id: "webchat", version: "1.0.0", platform: "web", mode: "webchat" },
          role: "operator",
          scopes: ["operator.read", "operator.write"],
          auth: { token: TOKEN }
        }
      };

      log('📤 Sending connect...', 'event');
      ws.send(JSON.stringify(req));
    }

    function sendAgent() {
      const text = document.getElementById('input').value.trim();
      if (!text) return;

      const req = {
        type: "req",
        id: nextMsgId(),
        method: "agent",
        params: {
          agentId: "rocky",
          message: text
        }
      };

      log(`💬 Agent: "${text}"`, 'info');
      logRaw(req);
      ws.send(JSON.stringify(req));
    }

    function sendSession() {
      const text = document.getElementById('input').value.trim();
      if (!text) return;

      const req = {
        type: "req",
        id: nextMsgId(),
        method: "sessions.send",
        params: {
          sessionKey: "agent:rocky:main",
          message: text
        }
      };

      log(`💬 Session: "${text}"`, 'info');
      logRaw(req);
      ws.send(JSON.stringify(req));
    }

    function clearLogs() {
      document.getElementById('log').innerHTML = '';
      document.getElementById('raw').innerHTML = '';
    }

    function copyLog() {
      const text = document.getElementById('log').innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert('Log copied to clipboard!');
      });
    }

    function copyRaw() {
      const text = document.getElementById('raw').innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert('Raw data copied to clipboard!');
      });
    }

    updateStatus(false);
    log('Ready', 'event');
  </script>
</body>
</html>
