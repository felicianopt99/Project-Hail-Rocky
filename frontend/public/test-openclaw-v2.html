<!DOCTYPE html>
<html>
<head>
  <title>OpenClaw Test v2 - Detailed</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #0f0;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #0f0;
      margin-bottom: 10px;
    }
    .status {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-weight: bold;
    }
    .status.disconnected { background: #330000; color: #ff6666; }
    .status.connecting { background: #333300; color: #ffff66; }
    .status.connected { background: #003300; color: #66ff66; }

    .controls {
      margin-bottom: 20px;
      padding: 10px;
      border: 1px solid #0f0;
      border-radius: 4px;
      background: #0a0e27;
    }

    button {
      padding: 10px 15px;
      margin-right: 10px;
      background: #0f0;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: monospace;
      font-weight: bold;
    }
    button:hover { background: #00ff00; }
    button:disabled { background: #666; cursor: not-allowed; }

    input {
      padding: 8px;
      background: #1a1f3a;
      color: #0f0;
      border: 1px solid #0f0;
      border-radius: 4px;
      font-family: monospace;
      width: 300px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      border: 1px solid #0f0;
      border-radius: 4px;
      padding: 15px;
      background: #0a0e27;
    }

    .panel h3 {
      margin-top: 0;
      color: #0f0;
      border-bottom: 1px solid #0f0;
      padding-bottom: 10px;
    }

    #log, #rawMessages {
      height: 400px;
      overflow-y: auto;
      background: #000;
      padding: 10px;
      border: 1px solid #0f0;
      border-radius: 4px;
      margin-top: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 12px;
      line-height: 1.4;
    }

    .event { color: #66ff66; }
    .response { color: #66ccff; }
    .error { color: #ff6666; }
    .info { color: #ffff66; }
    .timestamp { color: #666; }

    @media (max-width: 800px) {
      .panels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 OpenClaw WebSocket Tester v2</h1>

    <div id="status" class="status disconnected">🔴 Disconnected</div>

    <div class="controls">
      <button id="connectBtn" onclick="connect()">Connect</button>
      <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
      <button id="sendChatBtn" onclick="sendChat('message')" disabled>Send (message)</button>
      <button id="sendChatBtn2" onclick="sendChat('content')" disabled>Send (content)</button>
      <input type="text" id="chatInput" placeholder="Test message..." value="What is your name?">
      <button onclick="clearLogs()">Clear Logs</button>
    </div>

    <div class="panels">
      <div class="panel">
        <h3>📊 Log</h3>
        <div id="log"></div>
      </div>

      <div class="panel">
        <h3>📨 Raw Messages</h3>
        <div id="rawMessages"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "ws://127.0.0.1:18789";
    const TOKEN = "rocky-secret-token-2026";
    let ws = null;
    let msgId = 0;
    let isConnected = false;

    function nextMsgId() {
      return `msg-${++msgId}`;
    }

    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'event' ? 'event' : type === 'response' ? 'response' : 'info';
      const line = `<div class="${className}"><span class="timestamp">[${timestamp}]</span> ${msg}</div>`;
      logDiv.innerHTML += line;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function logRaw(data) {
      const rawDiv = document.getElementById('rawMessages');
      const line = `<div>${JSON.stringify(data, null, 2)}</div><hr>`;
      rawDiv.innerHTML += line;
      rawDiv.scrollTop = rawDiv.scrollHeight;
    }

    function updateStatus(connected) {
      const statusDiv = document.getElementById('status');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const sendChatBtn = document.getElementById('sendChatBtn');
      const sendChatBtn2 = document.getElementById('sendChatBtn2');

      isConnected = connected;

      if (connected) {
        statusDiv.className = 'status connected';
        statusDiv.textContent = '🟢 Connected';
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        sendChatBtn.disabled = false;
        sendChatBtn2.disabled = false;
      } else {
        statusDiv.className = 'status disconnected';
        statusDiv.textContent = '🔴 Disconnected';
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        sendChatBtn.disabled = true;
        sendChatBtn2.disabled = true;
      }
    }

    function connect() {
      log(`Connecting to ${BASE_URL}...`, 'info');
      document.getElementById('status').className = 'status connecting';
      document.getElementById('status').textContent = '🟡 Connecting...';

      try {
        ws = new WebSocket(BASE_URL);

        ws.onopen = () => {
          log('✅ WebSocket connected', 'event');
        };

        ws.onmessage = (event) => {
          try {
            const frame = JSON.parse(event.data);
            logRaw(frame);

            if (frame.type === 'event') {
              log(`📨 EVENT: ${frame.event}`, 'event');

              if (frame.event === 'connect.challenge') {
                handleChallenge(frame.payload);
              } else if (frame.event === 'hello-ok') {
                log('✅ Hello-ok received - CONNECTION SUCCESSFUL!', 'event');
                updateStatus(true);
              } else {
                const payload = typeof frame.payload === 'string'
                  ? frame.payload.substring(0, 100)
                  : JSON.stringify(frame.payload).substring(0, 100);
                log(`   Payload: ${payload}`, 'info');
              }
            } else if (frame.type === 'res') {
              log(`📋 RESPONSE: id=${frame.id}, ok=${frame.ok}`, 'response');
              if (!frame.ok) {
                log(`   ❌ Error: ${JSON.stringify(frame.error)}`, 'error');
              }
            }
          } catch (e) {
            log(`❌ Parse error: ${e.message}`, 'error');
          }
        };

        ws.onerror = (err) => {
          log(`❌ Error: ${err}`, 'error');
          updateStatus(false);
        };

        ws.onclose = () => {
          log('🔌 WebSocket closed', 'info');
          updateStatus(false);
        };
      } catch (e) {
        log(`❌ Failed to create WebSocket: ${e.message}`, 'error');
      }
    }

    function disconnect() {
      if (ws) {
        ws.close();
        log('Disconnecting...', 'info');
      }
    }

    function handleChallenge(challenge) {
      log(`✅ Received challenge: ${JSON.stringify(challenge).substring(0, 40)}...`, 'event');

      const connectReq = {
        type: "req",
        id: nextMsgId(),
        method: "connect",
        params: {
          minProtocol: 3,
          maxProtocol: 3,
          client: {
            id: "webchat",
            version: "1.0.0",
            platform: "web",
            mode: "webchat"
          },
          role: "operator",
          scopes: ["operator.read", "operator.write"],
          auth: { token: TOKEN }
        }
      };

      log('📤 Sending connect request...', 'info');
      logRaw(connectReq);
      ws.send(JSON.stringify(connectReq));
    }

    function sendChat(paramName) {
      const input = document.getElementById('chatInput');
      const content = input.value.trim();
      if (!content) {
        log('❌ Empty message', 'error');
        return;
      }

      const chatReq = {
        type: "req",
        id: nextMsgId(),
        method: "chat.send",
        params: paramName === 'content'
          ? { content: content }
          : { message: content }
      };

      log(`💬 Sending chat (${paramName}): "${content}"`, 'info');
      logRaw(chatReq);
      ws.send(JSON.stringify(chatReq));
    }

    function clearLogs() {
      document.getElementById('log').innerHTML = '';
      document.getElementById('rawMessages').innerHTML = '';
      log('Logs cleared', 'info');
    }

    // Initial status
    updateStatus(false);
    log('Ready to test OpenClaw connection', 'info');
  </script>
</body>
</html>
