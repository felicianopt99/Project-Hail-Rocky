model_list:
  - model_name: rocky-fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 2048
      temperature: 0.8

  - model_name: rocky-smart
    litellm_params:
      model: nvidia_nim/meta/llama-3.1-70b-instruct
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 4096
      temperature: 0.7

  - model_name: rocky-vision
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 2048

  # Fallback offline: Qwen 2.5 3B (Q4_K_M via Ollama).
  # Substituiu o phi3:mini — melhor instruction-following, multilingual,
  # e tool-calling nativo sem fine-tuning adicional.
  - model_name: rocky-offline
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://ollama:11434

router_settings:
  fallbacks:
    - rocky-fast: [rocky-smart, rocky-vision, rocky-offline]
  num_retries: 3
  retry_after: 5

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
