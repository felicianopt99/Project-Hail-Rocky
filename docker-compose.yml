services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rocky-backend
    network_mode: host
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_LLM_MODEL=${NVIDIA_LLM_MODEL:-meta/llama-3.1-405b-instruct}
      - DATABASE_URL=file:../data/dev.db
      - WEATHER_LAT=${WEATHER_LAT:-38.72}
      - WEATHER_LON=${WEATHER_LON:-9.13}
      - WEATHER_CITY=${WEATHER_CITY:-Lisboa}
      - HA_BASE_URL=${HA_BASE_URL}
      - HA_ACCESS_TOKEN=${HA_ACCESS_TOKEN}
      - KOKORO_URL=http://127.0.0.1:8880
      - PYTHONPATH=/app/backend
      - PRISMA_CLIENT_ENGINE_TYPE=binary
    env_file:
      - .env
    volumes:
      - .:/app
      - rocky-data:/app/data
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/backend/app
        - action: rebuild
          path: ./backend/requirements.txt
    command: sh -c "prisma generate --schema=prisma/schema.prisma && uvicorn app.main:sio_app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    depends_on:
      - homeassistant
      - kokoro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rocky-frontend
    network_mode: host
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=ws://127.0.0.1:8000
    env_file:
      - .env
    volumes:
      - ./frontend:/app
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json
    restart: unless-stopped

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ha-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

  kokoro:
    container_name: rocky-kokoro
    image: "ghcr.io/remsky/kokoro-fastapi-cpu:latest"
    network_mode: host
    restart: unless-stopped


  piper:
    container_name: rocky-piper
    image: "rhasspy/wyoming-piper:latest"
    network_mode: host
    command: --voice en_US-lessac-medium
    restart: unless-stopped

  openwakeword:
    build:
      context: .
      dockerfile: scripts/Dockerfile.wakeword
    container_name: rocky-openwakeword
    network_mode: host
    volumes:
      - .:/app
    command: python scripts/wakeword_detector.py
    restart: unless-stopped

volumes:
  rocky-data:
  ha-config:
  rocky-ollama-data:
