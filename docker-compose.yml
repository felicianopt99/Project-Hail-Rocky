services:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rocky-backend
    ports:
      - "8000:8000"
    networks:
      - rocky_net
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./tests/functional:/app/tests
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      voice_engine:
        condition: service_healthy
      letta:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: rocky-frontend
    ports:
      - "5173:5173"
    networks:
      - rocky_net
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=http://${LOCAL_IP:-127.0.0.1}:8000
    env_file:
      - .env
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    develop:
      watch:
        - action: sync+restart
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync+restart
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild
          path: ./frontend/package.json
    restart: unless-stopped
    depends_on:
      - backend

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: rocky-redis
    ports:
      - "6381:6381"
      - "8001:8001" # RedisInsight UI
    networks:
      - rocky_net
    environment:
      - REDIS_ARGS=--port 6381 --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (Letta backend — Phase 5) ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rocky-postgres
    ports:
      - "5433:5433"
    networks:
      - rocky_net
    command: postgres -p 5433
    environment:
      - POSTGRES_DB=rocky
      - POSTGRES_USER=rocky
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rocky-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5433 -U rocky -d rocky"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - letta
      - full

  # ── Home Assistant ────────────────────────────────────────────────────────
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ha-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    profiles:
      - ha

  # ── Home Assistant MCP Server ─────────────────────────────────────────────
  ha-mcp:
    image: ghcr.io/homeassistant-ai/ha-mcp:latest
    container_name: rocky-ha-mcp
    environment:
      - HOMEASSISTANT_URL=${HA_BASE_URL}
      - HOMEASSISTANT_TOKEN=${HA_ACCESS_TOKEN}
      - FASTMCP_TRANSPORT=sse
      - FASTMCP_PORT=3000
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "3000:3000"
    networks:
      - rocky_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - ha
      - full


  # ── Qdrant Vector DB (Phase 5 — Letta memory) ─────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rocky-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - rocky_net
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - letta
      - full

  # ── Letta (Phase 5 — Memory & Agents) ────────────────────────────────
  letta:
    image: letta/letta:latest
    container_name: rocky-letta
    ports:
      - "8283:8283"
    networks:
      - rocky_net
    env_file:
      - .env
    volumes:
      - letta-data:/root/.letta
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8283/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    profiles:
      - letta
      - full

  # ── Rocky Voice Engine (2026 Consolidated Architecture) ───────────────
  voice_engine:
    build:
      context: ./services/voice_engine
      dockerfile: Dockerfile
    container_name: rocky-voice-engine
    ports:
      - "8881:8881"
    networks:
      - rocky_net
    env_file:
      - .env
    volumes:
      - ./models:/models
      - ./services/voice_engine/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8881"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8881/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - voice
      - full



networks:
  rocky_net:
    driver: bridge

volumes:
  postgres-data:
  ha-config:
  qdrant-data:
  letta-data:
  ollama-data:
