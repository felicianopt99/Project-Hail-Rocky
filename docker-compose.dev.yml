# Development environment with hot reload and debugging
# Run: docker compose -f docker-compose.dev.yml up

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: rocky-gateway-dev
    network_mode: host
    environment:
      - OPENCLAW_HOME=/home/node/.openclaw
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=debug
    env_file:
      - .env
    volumes:
      - ./brain:/home/node/.openclaw
    restart: unless-stopped
    privileged: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    container_name: rocky-frontend-dev
    network_mode: host
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=ws://127.0.0.1:18789
      - VITE_OPENCLAW_TOKEN=${VITE_OPENCLAW_TOKEN:-rocky-secret-token-2026}
      - DEBUG=app:*
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - /app/node_modules
    develop:
      watch:
        - action: sync+restart
          path: ./frontend/src
          target: /app/src
          ignore:
            - node_modules
        - action: sync+restart
          path: ./frontend/public
          target: /app/public
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/vite.config.ts
    restart: unless-stopped

  homeassistant:
    container_name: homeassistant-dev
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ha-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

volumes:
  ha-config:
    driver: local
