# Development environment with hot reload
# Run: docker compose -f docker-compose.dev.yml up --watch
# Or: docker compose -f docker-compose.dev.yml up -d && docker compose logs -f

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: rocky-gateway-dev
    network_mode: host
    environment:
      - OPENCLAW_HOME=/home/node/.openclaw
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=debug
    env_file:
      - .env
    volumes:
      - ./brain:/home/node/.openclaw
    restart: unless-stopped
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18789/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: rocky-frontend-dev
    network_mode: host
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=ws://127.0.0.1:18789
      - VITE_OPENCLAW_TOKEN=${VITE_OPENCLAW_TOKEN:-rocky-secret-token-2026}
      - DEBUG=app:*
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      # Source code sync
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/index.html:/app/index.html:cached
      - ./frontend/tsconfig.json:/app/tsconfig.json:cached
      - ./frontend/vite.config.ts:/app/vite.config.ts:cached

      # Node modules (isolated from host)
      - /app/node_modules
      - /app/.vite
      - /app/dist

      # Vite cache directory
      - frontend-vite-cache:/app/.vite-cache
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
          ignore:
            - node_modules
            - "**/*.test.ts"
            - "**/*.spec.ts"
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/vite.config.ts
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3

  homeassistant:
    container_name: homeassistant-dev
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ha-config-dev:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - TZ=UTC

volumes:
  ha-config-dev:
    driver: local
  frontend-vite-cache:
    driver: local
